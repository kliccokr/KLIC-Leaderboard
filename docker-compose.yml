services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-klic_leaderboard}
      POSTGRES_USER: ${POSTGRES_USER:-klic}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-klic} -d ${POSTGRES_DB:-klic_leaderboard}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-klic}:${DB_PASSWORD}@db:5432/${POSTGRES_DB:-klic_leaderboard}
      TZ: ${TZ:-Asia/Seoul}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
